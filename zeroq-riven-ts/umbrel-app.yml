description: >-
  Riven TS is the experimental TypeScript rewrite of Riven. This package is for testing the backend on Umbrel with Postgres, Redis, and FUSE enabled.


  IMPORTANT


  Riven TS is not a replacement for the stable Riven app yet. It currently exposes the GraphQL backend directly and may not have a complete user-facing web UI.


  SET-UP INSTRUCTIONS


  1. Install Riven TS and open the app.
  2. Confirm the GraphQL server loads.
  3. Watch the app logs for startup or FUSE errors.
  4. Keep your stable Riven app installed until this test app proves useful.
