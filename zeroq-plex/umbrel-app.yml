manifestVersion: 1.1
id: zeroq-plex
category: media
name: Plex (Vortexo)
version: "1.43.3.10828.9"
tagline: Stream Movies & TV Shows
icon: https://avatars.githubusercontent.com/u/11744877?v=4
description: >-
  Stream movies and TV shows, plus 300+ channels of live TV, instantly, without a subscription. Watch live TV and movies anywhere, from any device, with Plex.


  Plex uses a server to house your media library and player apps to playback the media. Add, access, and share all the entertainment that matters to you, on almost any device.


  This ZeroQ package is intended to replace the stock Umbrel Plex app when you want direct integration with Orbit's private, Files-invisible library.

  Install and configure Orbit first so `/downloads/.vortexo-source` is owned by Orbit's integrated debrid mount instead of the Vortexo Server container.

  Set Plex libraries to:
  - `/downloads/vortexo/Movies`
  - `/downloads/vortexo/TV`


  ⚠️ Because Plex still runs in host network mode on port 32400, stop the stock Plex app before installing this package. This package does not import stock Plex data automatically; migrate that data separately before switching, and keep the stopped stock app as a rollback until the new package is verified.
developer: Plex
website: https://www.plex.tv/
dependencies:
  - zeroq-orbit
repo: ""
support: https://www.plex.tv/
port: 32400
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: /web
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - GPU
releaseNotes: >-
  Replaces the legacy Debrid Mount dependency with Orbit. Plex continues to read
  Orbit's private shared filesystem through a read-only slave mount,
  preventing Umbrel Files from indexing remote media while preserving the Plex
  library paths `/downloads/vortexo/Movies` and `/downloads/vortexo/TV`.


  TorBox source media remains remote. Plex metadata and temporary transcodes
  continue to use Plex's normal app-data directories.
submitter: ZeroQ
submission: https://github.com/ZeroQ-bit/Umbrel-Store/pull/2
