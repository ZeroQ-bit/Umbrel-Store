manifestVersion: 1.1
id: zeroq-plex
category: media
name: Plex (Vortexo)
version: "1.43.3.10828.11"
tagline: Plex Discover with private TorBox streaming
icon: https://avatars.githubusercontent.com/u/11744877?v=4
description: >-
  Stream movies and TV shows, plus 300+ channels of live TV, instantly, without a subscription. Watch live TV and movies anywhere, from any device, with Plex.


  Plex uses a server to house your media library and player apps to playback the media. Add, access, and share all the entertainment that matters to you, on almost any device.


  This ZeroQ package adds a private Vortexo gateway to Plex Web. Open Discover
  from the Umbrel tile to search configured Vortexo Sources, play cached TorBox
  releases, or add a chosen version to Plex without changing native Plex clients.

  Plex (Vortexo) owns its TorBox WebDAV mount and does not depend on Orbit.
  TorBox credentials stay server-side and only the authenticated Plex owner can
  configure or use Vortexo actions.

  Set Plex libraries to:
  - `/downloads/vortexo/Movies`
  - `/downloads/vortexo/TV`


  ⚠️ Because Plex still runs in host network mode on port 32400, stop the stock Plex app before installing this package. This package does not import stock Plex data automatically; migrate that data separately before switching, and keep the stopped stock app as a rollback until the new package is verified.
developer: Plex
website: https://www.plex.tv/
dependencies: []
repo: ""
support: https://www.plex.tv/
port: 32401
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: /web
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - GPU
releaseNotes: >-
  Completes the port 32401 gateway repair by keeping Nginx's error log in its
  private writable runtime directory and safely forwarding it to Umbrel
  troubleshooting without reopening the protected container stderr path.


  Stock Plex remains available on port 32400 for native clients and rollback.
  The new mount supervisor refuses to start while Orbit or any other process
  owns `/downloads/.vortexo-source`; it never detaches an unknown live mount.
submitter: ZeroQ
submission: https://github.com/ZeroQ-bit/Umbrel-Store/pull/2
