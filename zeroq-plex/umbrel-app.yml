releaseNotes: >-
  Community-store Plex build for ZeroQ App Store. Includes a permanent `/mount` bind for Riven with recursive slave propagation, and now imports the stock Umbrel Plex configuration into this app's own data directory on first start for a smoother migration.


  The bundled Plex image is still Plex Media Server 1.43.0.10492. Full upstream release notes are available at https://www.videohelp.com/software/Plex
