releaseNotes: >-
  Uses the standalone Debrid Mount app for `/downloads/.vortexo-source`, so Plex media stays visible when Vortexo Server is stopped or updated.


  Mounts Umbrel's shared downloads folder at `/downloads`, so Plex can scan Vortexo Server's generated library at `/downloads/vortexo`.


  Stops importing stock Plex app data automatically, so old Plex library scan preferences do not get carried forward into this package.


  Vortexo Server now keeps both its clean symlink library and its Debrid WebDAV source mount under the shared downloads folder, so Plex can follow symlinks without a separate app-data mount.


  The bundled Plex image is Plex Media Server 1.43.1.10611. Full upstream release notes are available at https://www.videohelp.com/software/Plex
submitter: ZeroQ
submission: https://github.com/ZeroQ-bit/Umbrel-Store/pull/2
