manifestVersion: 1
id: zeroq-plex
category: media
name: Plex (Vortexo)
version: "1.43.2.10687.7"
tagline: Stream Movies & TV Shows
icon: https://avatars.githubusercontent.com/u/11744877?v=4
description: >-
  Stream movies and TV shows, plus 300+ channels of live TV, instantly, without a subscription. Watch live TV and movies anywhere, from any device, with Plex.


  Plex uses a server to house your media library and player apps to playback the media. Add, access, and share all the entertainment that matters to you, on almost any device.


  This ZeroQ package is intended to replace the stock Umbrel Plex app when you want direct integration with Vortexo Server's RD WebDAV symlink library.

  Set Plex libraries to:
  - `/rd-library/Movies`
  - `/rd-library/TV`


  ⚠️ Because Plex still runs in host network mode on port 32400, stop the stock Plex app before installing this package. After you confirm this package imported your Plex setup correctly, you can remove the stock Plex app if you want.
developer: Plex
website: https://www.plex.tv/
dependencies: []
repo: ""
support: https://www.plex.tv/
port: 32400
gallery:
  - 1.jpg
  - 2.jpg
  - 3.jpg
path: /web
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - GPU
releaseNotes: >-
  Stops importing stock Plex app data automatically, so old Plex library scan preferences do not get carried forward into this package.


  Mounts both Vortexo Server's RD WebDAV symlink library at `/rd-library` and its RD source path at `/mnt/rd` so Plex can follow the symlinked video files correctly.


  The bundled Plex image is Plex Media Server 1.43.1.10611. Full upstream release notes are available at https://www.videohelp.com/software/Plex
submitter: ZeroQ
submission: https://github.com/ZeroQ-bit/Umbrel-Store/pull/2
