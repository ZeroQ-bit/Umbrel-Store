manifestVersion: 1
id: zeroq-plex
category: media
name: Plex (Vortexo)
version: "1.43.2.10687.7"
tagline: Stream Movies & TV Shows
icon: https://avatars.githubusercontent.com/u/11744877?v=4
description: >-
  Stream movies and TV shows, plus 300+ channels of live TV, instantly, without a subscription. Watch live TV and movies anywhere, from any device, with Plex.


  Plex uses a server to house your media library and player apps to playback the media. Add, access, and share all the entertainment that matters to you, on almost any device.


  This ZeroQ package is intended to replace the stock Umbrel Plex app when you want direct integration with Vortexo Server's shared downloads library.

  Install and configure Debrid Mount first so `/downloads/.vortexo-source` is owned by a dedicated rclone/zurg app instead of the Vortexo Server container.

  Set Plex libraries to:
  - `/downloads/vortexo/Movies`
  - `/downloads/vortexo/TV`


  ⚠️ Because Plex still runs in host network mode on port 32400, stop the stock Plex app before installing this package. After you confirm this package imported your Plex setup correctly, you can remove the stock Plex app if you want.
developer: Plex
