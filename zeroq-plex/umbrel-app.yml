path: /web/index.html
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - GPU
releaseNotes: >-
  Adds owner-controlled Plex Watchlist automation for native Plex clients.
  Vortexo can check the Watchlist every minute, select a cached Best, 4K, or
  1080p release, and run it through the persistent TorBox-to-Plex pipeline.


  Existing Plex titles and active jobs are skipped. Movies import directly;
  TV shows safely start with the first regular episode. Cached-only mode is on
  by default, and removing a Watchlist item never deletes media.


  Stock Plex remains available on port 32400 for native clients and rollback.
  The new mount supervisor refuses to start while Orbit or any other process
  owns `/downloads/.vortexo-source`; it never detaches an unknown live mount.
submitter: ZeroQ
submission: https://github.com/ZeroQ-bit/Umbrel-Store/pull/2
