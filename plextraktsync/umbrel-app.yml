manifestVersion: 1.1
id: plextraktsync
category: media
name: PlexTraktSync
version: "0.35.5"
tagline: Sync Trakt watch progress to Plex
icon: https://raw.githubusercontent.com/Taxel/PlexTraktSync/main/trakt.ico
description: >-
  PlexTraktSync syncs media state between trakt.tv and Plex Media Server without requiring Plex Pass or Trakt VIP.


  This ZeroQ package is configured for a narrow, safer first-run workflow: importing your Trakt Continue Watching playback progress into Plex Continue Watching. The default config enables `trakt_to_plex.playback_status` and disables ratings, watchlists, collections, liked lists, and watched-status syncing until you opt into them yourself.


  SET-UP INSTRUCTIONS


  1. Install the app.

  2. Open the app page for setup notes.

  3. SSH into Umbrel and run the login command shown on the app page to connect Plex and Trakt.

  4. Restart the app to run the first playback-progress import.


  If Plex is running on the same Umbrel, use `http://host.docker.internal:32400` as the Plex server URL when prompted.
