name: Build Plex Vortexo image

on:
  push:
    branches:
      - master
    paths:
      - "plex-vortexo-src/**"
      - ".github/workflows/plex-vortexo-docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test Plex Vortexo
        working-directory: plex-vortexo-src
        run: |
          python3 -m unittest discover -s tests -v
          python3 -m compileall -q vortexo
          node --check web/plex-vortexo.js
          sh -n entrypoint.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Plex Vortexo
        uses: docker/build-push-action@v6
        with:
          context: plex-vortexo-src
          push: true
          tags: |
            ghcr.io/zeroq-bit/plex-vortexo:main
            ghcr.io/zeroq-bit/plex-vortexo:${{ github.sha }}
