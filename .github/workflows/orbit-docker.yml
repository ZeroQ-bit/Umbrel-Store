name: Build Orbit image

on:
  push:
    branches:
      - master
    paths:
      - "orbit-src/**"
      - ".github/workflows/orbit-docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test Orbit
        working-directory: orbit-src
        run: python3 -m unittest discover -s tests -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Orbit
        uses: docker/build-push-action@v6
        with:
          context: orbit-src
          push: true
          tags: |
            ghcr.io/zeroq-bit/orbit:main
            ghcr.io/zeroq-bit/orbit:${{ github.sha }}
