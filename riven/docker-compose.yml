version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: riven_server_1
      APP_PORT: 8080

  server:
    image: spoked/riven:sha-06f5a78@sha256:ae3fb74a70e73978fd9baac6b869d7ce067068a07ae579cda809c6bf00126918
    restart: on-failure
    stop_grace_period: 1m
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    shm_size: 1024m
    devices:
      - /dev/fuse
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Etc/UTC
      RIVEN_FORCE_ENV: "true"
      RIVEN_DATABASE_HOST: postgresql+psycopg2://postgres:postgres@riven-postgres/riven
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    volumes:
      - ${APP_DATA_DIR}/data/riven:/riven/data
      - ${APP_DATA_DIR}/data/mount:/mount:rshared
    depends_on:
      riven-postgres:
        condition: service_healthy

  riven-postgres:
    image: postgres:17-alpine@sha256:778d0b486d6daa02b77434d0358ec57a1b21fd8b6d22ac2eef56a33e816928f6
    restart: on-failure
    stop_grace_period: 1m
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: riven
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d riven"]
      interval: 10s
      timeout: 5s
      retries: 5
