worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    error_log /tmp/nginx/error.log warn;
    client_body_temp_path /tmp/nginx/client;
    fastcgi_temp_path /tmp/nginx/fastcgi;
    proxy_temp_path /tmp/nginx/proxy;
    scgi_temp_path /tmp/nginx/scgi;
    uwsgi_temp_path /tmp/nginx/uwsgi;
    sendfile on;
    tcp_nopush on;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    upstream plex_server {
        server 127.0.0.1:32400;
        keepalive 32;
    }

    upstream vortexo_api {
        server 127.0.0.1:32403;
        keepalive 8;
    }

    server {
        listen 32401;
        server_name _;
        client_max_body_size 8m;

        location = /vortexo/health {
            proxy_pass http://vortexo_api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location ^~ /vortexo/api/ {
            proxy_pass http://vortexo_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_buffering off;
        }

        location ^~ /vortexo/play/ {
            proxy_pass http://vortexo_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            proxy_set_header Connection "";
            proxy_request_buffering off;
            proxy_buffering off;
        }

        location ^~ /vortexo/assets/ {
            alias /opt/vortexo/web/;
            add_header Cache-Control "private, max-age=300";
            add_header X-Content-Type-Options nosniff;
        }

        location = /web/index.html {
            proxy_pass http://plex_server;
            proxy_http_version 1.1;
            proxy_set_header Host 127.0.0.1:32400;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Accept-Encoding "";
            proxy_hide_header Content-Length;
            sub_filter_once on;
            sub_filter "</head>" "<link rel=\"stylesheet\" href=\"/vortexo/assets/plex-vortexo.css\"><script src=\"/vortexo/assets/hls.min.js\"></script><script src=\"/vortexo/assets/plex-vortexo.js\"></script></head>";
        }

        location / {
            proxy_pass http://plex_server;
            proxy_http_version 1.1;
            proxy_set_header Host 127.0.0.1:32400;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            proxy_request_buffering off;
            proxy_buffering off;
        }
    }
}
