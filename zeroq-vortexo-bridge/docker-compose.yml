version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: zeroq-vortexo-bridge-server
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  server:
    image: ghcr.io/zeroq-bit/vortexo-manifest-server:main@sha256:e3901232e187db746bcf1140ec664fc7c2da7d30e1ecdd9da96440db98b70f71
    restart: on-failure
    stop_grace_period: 30s
    environment:
      VORTEXO_LISTEN_ADDR: ":8080"
      VORTEXO_DATA_DIR: /data
      VORTEXO_ADMIN_USERNAME: vortexo
      VORTEXO_ADMIN_PASSWORD: vortexo
      # Optional: set this through Umbrel environment to enable Plex-backed trailers.
      VORTEXO_PLEX_TOKEN: "${VORTEXO_PLEX_TOKEN:-}"
      # Allow Vortexo Apple TV to read watch-state/continue-watching without
      # server-side credential exchange.
      VORTEXO_PUBLIC_WATCH_STATE: "true"
      TZ: Etc/UTC
    volumes:
      - ${APP_DATA_DIR}/data:/data
    networks:
      default:
        aliases:
          - zeroq-vortexo-bridge-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
