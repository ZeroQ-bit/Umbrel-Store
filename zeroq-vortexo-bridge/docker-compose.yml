version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: zeroq-vortexo-bridge-server
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  server:
    image: ghcr.io/zeroq-bit/vortexo_server:main@sha256:ce844d7d89710a275eeca1e157f366387dab114aa6d2a3e5104a5a49af2b3bc1
    restart: on-failure
    stop_grace_period: 30s
    environment:
      VORTEXO_LISTEN_ADDR: ":8080"
      VORTEXO_DATA_DIR: /data
      VORTEXO_ADMIN_USERNAME: vortexo
      VORTEXO_ADMIN_PASSWORD: vortexo
      TZ: Etc/UTC
    volumes:
      - ${APP_DATA_DIR}/data:/data
    networks:
      default:
        aliases:
          - zeroq-vortexo-bridge-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
