version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: zeroq-plex-debrid_server_1
      APP_PORT: 8080
      # Holds the TorBox API key, so gate the UI behind Umbrel's session auth.
      PROXY_AUTH_ADD: "true"

  server:
    # NOTE: pin with @sha256 once CI publishes the first image. Until then
    # the :main tag tracks the latest build off the default branch.
    image: ghcr.io/zeroq-bit/plex_debrid:main
    restart: on-failure
    stop_grace_period: 30s
    environment:
      TZ: Etc/UTC
      PD_CONFIG_DIR: /config
      PD_LOG_DIR: /logs
      PD_WEB_PORT: "8080"
    volumes:
      - ${APP_DATA_DIR}/config:/config
      - ${APP_DATA_DIR}/logs:/logs
    networks:
      default:
        aliases:
          - zeroq-plex-debrid
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
