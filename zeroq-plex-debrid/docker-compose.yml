version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: zeroq-plex-debrid_server_1
      APP_PORT: 8080
      # Holds the TorBox API key, so gate the UI behind Umbrel's session auth.
      PROXY_AUTH_ADD: "true"

  server:
    # Keep the readable branch tag while pinning the exact tested image that
    # corresponds to the Umbrel app version below.
    image: ghcr.io/zeroq-bit/plex_debrid:main@sha256:6b8e3607cc79bf8d5b77ff399dbe02707489e66bc3232bb5d4ef86ddb4f0aa71
    restart: on-failure
    stop_grace_period: 30s
    environment:
      TZ: Etc/UTC
      PD_CONFIG_DIR: /config
      PD_LOG_DIR: /logs
      PD_WEB_PORT: "8080"
      # Library symlinker: shared downloads bind (matches zeroq-plex and
      # zeroq-debrid-mount) so the symlinker can read the raw mount and write
      # {tmdb-ID} symlinks into the Plex library.
      PD_DOWNLOADS_DIR: /downloads
      PD_VORTEXO_SOURCE_DIR: /downloads/.vortexo-source
      PD_LIBRARY_MOVIES_DIR: /downloads/vortexo/Movies
      PD_LIBRARY_TV_DIR: /downloads/vortexo/TV
    volumes:
      - ${APP_DATA_DIR}/config:/config
      - ${APP_DATA_DIR}/logs:/logs
      - ${UMBREL_ROOT}/home/Downloads:/downloads:rslave
    networks:
      default:
        aliases:
          - zeroq-plex-debrid
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
