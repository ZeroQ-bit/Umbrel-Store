version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: zeroq-plex-debrid_server_1
      APP_PORT: 8080
      # Holds the TorBox API key, so gate the UI behind Umbrel's session auth.
      PROXY_AUTH_ADD: "true"

  server:
    # Keep the readable branch tag while pinning the exact tested image that
    # corresponds to the Umbrel app version below.
    image: ghcr.io/zeroq-bit/plex_debrid:main@sha256:2f30c4b3842fa49dedf729820e9ee4960871af4ba3b9a6eef202b0152ab1173c
    restart: on-failure
    stop_grace_period: 30s
    environment:
      TZ: Etc/UTC
      PD_CONFIG_DIR: /config
      PD_LOG_DIR: /logs
      PD_WEB_PORT: "8080"
      # Stable container paths backed by Debrid Mount's Files-invisible root.
      # The symlinker reads the remote mount and writes only library symlinks.
      PD_DOWNLOADS_DIR: /downloads
      PD_VORTEXO_SOURCE_DIR: /downloads/.vortexo-source
      PD_LIBRARY_MOVIES_DIR: /downloads/vortexo/Movies
      PD_LIBRARY_TV_DIR: /downloads/vortexo/TV
    volumes:
      - ${APP_DATA_DIR}/config:/config
      - ${APP_DATA_DIR}/logs:/logs
      # Keep the remote source read-only even though this image runs as root.
      - ${UMBREL_ROOT}/data/zeroq-media:/downloads:rslave,ro
      # Narrow writable overlay: symlinks and small scan markers only.
      - ${UMBREL_ROOT}/data/zeroq-media/vortexo:/downloads/vortexo
    networks:
      default:
        aliases:
          - zeroq-plex-debrid
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
