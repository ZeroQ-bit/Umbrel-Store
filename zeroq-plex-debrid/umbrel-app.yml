releaseNotes: >-
  Adds a library symlinker so newly-downloaded media actually appears in Plex:

  - After each download, plex_debrid now creates a {tmdb-ID}/{tvdb-ID} symlink
    in the Plex library pointing at the Debrid Mount, in the exact format Plex
    expects. A periodic background sweep reconciles the library against TorBox
    and retroactively fills anything missing.
  - Mounts the shared /downloads folder (matching the Plex app) so the
    symlinker can read the raw mount and write into the library; now depends
    on the Debrid Mount app.
  - Configurable from the Web UI (Library Symlinker section): enable, sweep
    interval, mount/library paths.

  Also fixes the TorBox download handoff (requestdl needs token= param) and
  deviation-regex matching (empty Special character renaming config wiped
  space->dot conversion). Includes all prior fixes.
