releaseNotes: >-
  Improves Plex export source matching under the mounted Real-Debrid filesystem by using media title and year hints instead of relying on an exact torrent-name match. This targets the remaining export failure where items reach the Real-Debrid library successfully but StreamArr cannot locate the mounted file to symlink into Plex.
