description: >-
  Vortexo Server is a self-hosted media management system with a Netflix-style UI, Stremio-compatible stream providers, live TV support, and Xtream Codes / M3U output for IPTV apps.


  It combines movie and series discovery, Debrid-backed streaming, playlists, EPG, and IPTV source management in a single web app.


  SET-UP INSTRUCTIONS


  1. Open Vortexo Server and create your first admin account.
  2. Add your TMDB API key in Settings.
  3. Configure your preferred Stremio addons, Debrid provider, and any live TV or Xtream sources.
