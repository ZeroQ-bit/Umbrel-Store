releaseNotes: >-
  Cleans up a stale/disconnected Real-Debrid WebDAV mount before startup so Umbrel updates do not get stuck at 99% with `Transport endpoint is not connected`.


  Removes legacy TMDB-tagged generated TV folders when a TVDB-tagged RD WebDAV folder replaces them, preventing Plex from keeping stale mismatched shows.


  Merges duplicate Real-Debrid Library and RD WebDAV Library entries that point at the same cached file, keeping the local RD WebDAV playback path while preserving the richer stream metadata.


  Regenerates TV symlink folders with TVDB-first Plex IDs, for example `The Sopranos (1999) {tvdb-75299}`, so Plex TV Series matching does not misidentify valid files as unrelated shows.


  Removes superseded RD WebDAV symlinks when a movie or episode path changes, letting Plex rescan the current canonical library tree instead of keeping stale paths.


  Allows the RD WebDAV rclone mount to attach over Umbrel's shared bind folder so Plex can resolve symlink targets.


  Fixes the RD WebDAV mount readiness check so the server starts rclone over the shared `/mnt/rd` folder instead of treating the empty bind mount as ready.


  Fixes the Umbrel shared-mount hook so the RD WebDAV FUSE mount is propagated on the real app-data path Plex reads from.


  Adds `--allow-other` to the RD WebDAV rclone mount so Plex can traverse the shared `/mnt/rd` target behind the `/app/rd-library` symlinks.


  Also keeps the legacy Vortexo Server web UI showing RD WebDAV library-backed sources instead of misleading empty results.
