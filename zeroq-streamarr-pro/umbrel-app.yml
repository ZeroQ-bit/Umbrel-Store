releaseNotes: >-
  StreamArr now owns the Real-Debrid mount inside its own app container on Umbrel, so Plex Export no longer depends on the separate Riven app being installed or running. The export mount stays writable for Plex-visible symlinks, while the RD library mount is handled internally with Zurg + rclone.
