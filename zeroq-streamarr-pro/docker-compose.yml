version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: zeroq-streamarr-pro-server
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  server:
    image: ghcr.io/zeroq-bit/vortexo-server:main-213cac5@sha256:8b82b535fa75d43ad448c853f35aee3b824c52784ba20cb7b8db2ed67ddbaa49
    restart: on-failure
    stop_grace_period: 1m
    environment:
      DATABASE_URL: postgres://streamarr:streamarr@postgres:5432/streamarr?sslmode=disable
      JWT_SECRET: ${APP_SEED}
      STREAMARR_DISABLE_SELF_UPDATE: "true"
      STREAMARR_LISTEN_PORT: "8080"
      LIBRETRANSLATE_URL: http://libretranslate:5000
      TZ: Etc/UTC
    volumes:
      - ${APP_DATA_DIR}/data/cache:/app/cache
      - ${APP_DATA_DIR}/data/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
        aliases:
          - zeroq-streamarr-pro-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  libretranslate:
    image: libretranslate/libretranslate:v1.9.5@sha256:b358e61598c9d5240ddb5f9e8f53389931db8305ccfd426fbfcc603f4b24c7a4
    restart: on-failure
    stop_grace_period: 1m
    user: "0:0"
    environment:
      LT_HOST: 0.0.0.0
      LT_PORT: "5000"
      LT_THREADS: "2"
      LT_DISABLE_WEB_UI: "true"
      LT_DISABLE_FILES_TRANSLATION: "true"
      LT_UPDATE_MODELS: "true"
      LT_LOAD_ONLY: en,ar,bg,cs,da,de,el,es,fi,fr,it,nl,pl,pt,ru,sv,tr,uk,zh-Hans
    volumes:
      - ${APP_DATA_DIR}/data/libretranslate:/home/libretranslate/.local/share:rw
    healthcheck:
      test: ["CMD-SHELL", "./venv/bin/python scripts/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 2m

  postgres:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    restart: on-failure
    stop_grace_period: 1m
    environment:
      POSTGRES_DB: streamarr
      POSTGRES_USER: streamarr
      POSTGRES_PASSWORD: streamarr
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamarr -d streamarr"]
      interval: 10s
      timeout: 5s
      retries: 5
