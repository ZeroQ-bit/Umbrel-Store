version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: zeroq-streamarr-pro-server
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  server:
    image: ghcr.io/zeroq-bit/streamarr-pro:main-1325621@sha256:97452f118861b739d02df87550c9b5a2c4b1e0ef01019cd9e0530a86a50a9881
    restart: on-failure
    stop_grace_period: 1m
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse
    environment:
      DATABASE_URL: postgres://streamarr:streamarr@postgres:5432/streamarr?sslmode=disable
      JWT_SECRET: ${APP_SEED}
      STREAMARR_DISABLE_SELF_UPDATE: "true"
      STREAMARR_LISTEN_PORT: "8080"
      TZ: Etc/UTC
    volumes:
      - ${APP_DATA_DIR}/data/cache:/app/cache
      - ${APP_DATA_DIR}/data/logs:/app/logs
      - ${UMBREL_ROOT}/data/storage/downloads/riven:/mount
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
        aliases:
          - zeroq-streamarr-pro-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    restart: on-failure
    stop_grace_period: 1m
    environment:
      POSTGRES_DB: streamarr
      POSTGRES_USER: streamarr
      POSTGRES_PASSWORD: streamarr
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamarr -d streamarr"]
      interval: 10s
      timeout: 5s
      retries: 5
