manifestVersion: 1.1
id: zeroq-plextraktsync
category: media
name: PlexTraktSync
version: "0.35.5.5"
tagline: Sync Trakt watch progress to Plex
icon: https://raw.githubusercontent.com/Taxel/PlexTraktSync/main/trakt.ico
description: >-
  PlexTraktSync syncs media state between trakt.tv and Plex Media Server without requiring Plex Pass or Trakt VIP.


  This ZeroQ package includes a browser-based setup page so you can connect Plex, authorize Trakt, choose sync options, and run an import without SSH. The default config enables `trakt_to_plex.playback_status` and disables ratings, watchlists, collections, liked lists, and watched-status syncing until you opt into them.


  Open the app after install, add your Plex server/token or discover Plex from your Plex account, authorize Trakt with a Trakt API app, then press Run Sync Now.


  If Plex is running on the same Umbrel, `http://host.docker.internal:32400` is usually the right Plex server URL.
developer: Taxel and PlexTraktSync contributors
website: https://github.com/Taxel/PlexTraktSync
