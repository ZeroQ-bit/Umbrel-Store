version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: zeroq-plextraktsync_web_1
      APP_PORT: 80

  web:
    image: nginx:1.27@sha256:124b44bfc9ccd1f3cedf4b592d4d1e8bddb78b51ec2ed5056c52d3692baebc19
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/web:/usr/share/nginx/html:ro

  api:
    image: ghcr.io/taxel/plextraktsync:0.35.7@sha256:d210acddb9e08f34829ac42965db7b3726ed070acd119c25bc8612a08b4bfdc3
    command:
      - sh
      - -c
      - python /app/web/server.py
    restart: on-failure
    stdin_open: true
    tty: true
    ports:
      - "3491:3490"
    volumes:
      - ${APP_DATA_DIR}/data/config:/app/config
      - ${APP_DATA_DIR}/data/web:/app/web:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Perth
      - WEB_PORT=3490
    extra_hosts:
      - "host.docker.internal:host-gateway"
