version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: zeroq-plextraktsync_web_1
      APP_PORT: 80

  web:
    image: nginx:1.27@sha256:124b44bfc9ccd1f3cedf4b592d4d1e8bddb78b51ec2ed5056c52d3692baebc19
    command:
      - /bin/sh
      - -c
      - |
        cat >/etc/nginx/conf.d/default.conf <<'NGINX'
        server {
            listen 80;
            server_name _;

            root /usr/share/nginx/html;
            index index.html;

            resolver 127.0.0.11 valid=30s ipv6=off;

            location /api/ {
                set $api_upstream api:3490;
                proxy_pass http://$api_upstream;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 3600s;
            }

            location / {
                try_files $uri $uri/ /index.html;
            }
        }
        NGINX
        exec nginx -g 'daemon off;'
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/web:/usr/share/nginx/html:ro

  api:
    image: ghcr.io/taxel/plextraktsync:0.35.5@sha256:de61cbdeeb242ed32efb2e16ed18cec6920098c0dc612e83ac68b93f01294b8a
    command:
      - sh
      - -c
      - python /app/web/server.py
    restart: on-failure
    stdin_open: true
    tty: true
    volumes:
      - ${APP_DATA_DIR}/data/config:/app/config
      - ${APP_DATA_DIR}/data/web:/app/web:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Perth
      - WEB_PORT=3490
    extra_hosts:
      - "host.docker.internal:host-gateway"
