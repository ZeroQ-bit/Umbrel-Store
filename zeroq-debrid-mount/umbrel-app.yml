manifestVersion: 1
id: zeroq-debrid-mount
category: media
name: Debrid Mount
version: "1.1.0"
tagline: TorBox/Real-Debrid mount for Plex and Vortexo, configured in the browser
icon: https://raw.githubusercontent.com/ZeroQ-bit/Vortexo-Manifest-Server/main/icon.svg
description: >-
  Debrid Mount runs rclone as its own Umbrel app so Plex does not lose media when Vortexo Server is stopped or updated.


  It defaults to TorBox/WebDAV mode and can also run Real-Debrid through zurg plus rclone.


  Now with a built-in Web UI — configure everything from the browser, no SSH required:


  1. Install Debrid Mount and open the app.
  2. Pick your debrid mode (TorBox WebDAV or Real-Debrid zurg).
  3. Enter your TorBox WebDAV username/password (from TorBox → Settings → WebDAV) and click Test.
  4. Click Save & Mount.
  5. In Vortexo Server, keep the Debrid WebDAV Library scanner enabled but turn off Vortexo's own WebDAV mount toggle.
  6. Keep Vortexo's source path at `/downloads/.vortexo-source` and clean symlink library at `/downloads/vortexo`.
  7. In Plex, keep libraries pointed at `/downloads/vortexo/Movies` and `/downloads/vortexo/TV`.
developer: ZeroQ
website: https://github.com/ZeroQ-bit/Umbrel-Store
dependencies: []
repo: https://github.com/ZeroQ-bit/Umbrel-Store
