releaseNotes: >-
  Fixes failed reinstall/install attempts caused by a stale Docker container named `zeroq-debrid-mount_mount_1` left behind by an earlier failed install.


  Fixes installation by replacing the old private Vortexo Server container image with a public pinned debrid mount image, using Umbrel's expected container DNS name for the app proxy, and enabling FUSE allow_other before rclone starts.


  Fixes Umbrel script mounting by binding `mount.sh` from `${APP_DATA_DIR}` and mounts the shared `/downloads` parent so the rclone FUSE mount propagates correctly into Vortexo Server and Plex.


  Initial package. Adds a standalone rclone mount for TorBox/WebDAV and optional Real-Debrid zurg mode so Plex can keep resolving Vortexo symlink targets even when Vortexo Server is down.
