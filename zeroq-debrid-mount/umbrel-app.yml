port: 18777
gallery: []
path: /index.html
defaultUsername: ""
defaultPassword: ""
torOnly: false
permissions:
  - STORAGE_DOWNLOADS
releaseNotes: >-
  Adds a built-in Web UI for configuring the mount from the browser — no more
  SSH to edit debrid.env. Set TorBox WebDAV creds (or Real-Debrid zurg token),
  test the connection with one click, and mount/unmount/restart from the page.
  Live status pill + rclone log tail included.


  Initial package. Adds a standalone rclone mount for TorBox/WebDAV and optional Real-Debrid zurg mode so Plex can keep resolving Vortexo symlink targets even when Vortexo Server is down.
submitter: ZeroQ
submission: https://github.com/ZeroQ-bit/Umbrel-Store/pull/2
