version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: zeroq-debrid-mount_server_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  server:
    image: iampuid0/pd_zurg:2.9.2@sha256:48ab5705e23e9afa511611aed47107b79b5c3d3ab0ff039720068b3f66ded374
    restart: on-failure
    stop_grace_period: 1m
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - apparmor:unconfined
    environment:
      TZ: Etc/UTC
      DEBRID_CONFIG_DIR: /config
      DEBRID_STATUS_DIR: /status
      DEBRID_MOUNTPOINT: /downloads/.vortexo-source
      DEBRID_HOST_MOUNT_PATH: ${UMBREL_ROOT}/data/zeroq-media/.vortexo-source
      DEBRID_RAM_CACHE_DIR: /rclone-cache
    entrypoint:
      - /bin/sh
      - /usr/local/bin/debrid-mount
    volumes:
      # Runtime lives under hooks because Umbrel copies hooks on app updates.
      - ${APP_DATA_DIR}/hooks/runtime/mount.sh:/usr/local/bin/debrid-mount:ro
      - ${APP_DATA_DIR}/hooks/runtime/web_ui.py:/usr/local/bin/web_ui.py:ro
      - ${APP_DATA_DIR}/data/config:/config
      - ${APP_DATA_DIR}/data/status:/status
      # Files-invisible host root. Child FUSE mounts propagate to consumers.
      - ${UMBREL_ROOT}/data/zeroq-media:/downloads:rshared
    tmpfs:
      # Belt-and-suspenders: any rclone scratch data is RAM-only and bounded.
      - /rclone-cache:size=64m,mode=0700
    networks:
      default:
        aliases:
          - zeroq-debrid-mount
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
