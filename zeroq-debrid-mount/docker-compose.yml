version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: zeroq-debrid-mount_server_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  server:
    image: iampuid0/pd_zurg:2.9.2@sha256:48ab5705e23e9afa511611aed47107b79b5c3d3ab0ff039720068b3f66ded374
    restart: on-failure
    stop_grace_period: 1m
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - apparmor:unconfined
    environment:
      TZ: Etc/UTC
      DEBRID_CONFIG_DIR: /config
      DEBRID_STATUS_DIR: /status
      DEBRID_MOUNTPOINT: /downloads/.vortexo-source
      DEBRID_HOST_MOUNT_PATH: ${UMBREL_ROOT}/home/Downloads/.vortexo-source
    entrypoint:
      - /bin/bash
      - /usr/local/bin/debrid-mount
    volumes:
      - ${APP_DATA_DIR}/mount.sh:/usr/local/bin/debrid-mount:ro
      - ${APP_DATA_DIR}/data/config:/config
      - ${APP_DATA_DIR}/data/status:/status
      - ${UMBREL_ROOT}/home/Downloads:/downloads:rshared
    networks:
      default:
        aliases:
          - zeroq-debrid-mount
    healthcheck:
      test: ["CMD-SHELL", "test -f /status/config-needed || grep -q ' /downloads/.vortexo-source ' /proc/self/mountinfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
