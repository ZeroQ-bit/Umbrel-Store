torOnly: false
permissions: []
releaseNotes: >-
  Adds a Plex Library view with current resolution, HDR or Dolby Vision, codecs,
  containers, sizes, episode counts, and multiple versions. Discover now marks
  titles already in Plex, lower-quality items can enter an explicit 1080p
  upgrade flow, and automatic lists skip existing Plex media. Stream-level Plex
  metadata now fills quality details missing from older media records. Mount
  startup now reconstructs its safety marker only after verifying the dedicated
  host media bind, expected host path, and an empty mountpoint.
submitter: ZeroQ
