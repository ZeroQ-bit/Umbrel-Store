releaseNotes: >-
  Fixes automatic-list reconnects. Adding an MDBList or Trakt URL that is
  already connected now updates and reuses the existing source instead of
  showing a raw database constraint error. The Connect list button is disabled
  while a request is being saved to prevent accidental duplicate submissions.
