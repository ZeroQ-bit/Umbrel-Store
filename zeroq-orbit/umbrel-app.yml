releaseNotes: >-
  Adds optional aired-series completion. When Plex already has at least one
  episode of a series, Orbit can check for and acquire the remaining episodes
  that have aired while ignoring future episodes. A configurable daily limit
  rotates safely through larger libraries and avoids duplicate checks. This
  update also fixes acquisition-worker startup with the bundled engine.
