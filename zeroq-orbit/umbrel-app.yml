releaseNotes: >-
  Adds full series, season, and episode drill-down to Library, including current
  video, audio, and subtitle stream details. Replacement searches can target a
  movie, an entire series, one season, or one episode with Best, 1080p, or 4K
  quality while the existing Plex stream remains available. Settings now has
  separate Discovery, Debrid, Plex, Scrapers, and Series tabs, with controls for
  Torrentio, Prowlarr, Jackett, Orionoid, Nyaa, and 1337x.
