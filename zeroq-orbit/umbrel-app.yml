releaseNotes: >-
  Adds remote-stream protection for Plex. Orbit now checks Plex-unavailable
  paths every five minutes, safely retargets broken symlinks when a matching
  TorBox stream still exists, and queues bounded replacement searches when it
  does not. Plex scans are blocked while the mount is unhealthy and run once
  after mount recovery to clear stale unavailable flags. Also adds one-minute
  Plex Watchlist imports with duplicate prevention and non-destructive removal.
