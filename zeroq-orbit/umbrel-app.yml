releaseNotes: >-
  Fixes installation by publishing Orbit's container image from the Umbrel
  repository and pinning the verified image digest. Includes manual TMDb
  search, Add to Plex requests, MDBList and Trakt automatic imports, a
  persistent request pipeline, unified mount controls, and the Orbit visual
  identity.
