releaseNotes: >-
  Replaces full Plex recovery scans with exact-folder partial scans. Orbit can
  stop an active scan, disables automatic and periodic Plex scans while stream
  protection is enabled, and keeps unavailable entries from being emptied.
  Adds one credential-free JSON manifest per title with Plex metadata, quality,
  media paths, and symlink targets for instant Orbit inventory access.
